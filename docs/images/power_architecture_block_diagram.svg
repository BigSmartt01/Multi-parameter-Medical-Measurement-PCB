<svg width="680" height="586" viewBox="0 0 680 586" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Electrical power architecture</title>
<desc>Block diagram showing power flow from the battery pack through the BMS and switch to a 12V rail, branching to the pump and solenoid on one side, and through a buck converter to 5V and 3V3 rails powering the ESP32 and sensors on the other.</desc>
<defs>
<marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#3d3d3a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect width="680" height="586" fill="#ffffff"/>

<rect x="60" y="40" width="150" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="135" y="62" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#04342C" text-anchor="middle" dominant-baseline="central">3x 18650</text>
<text x="135" y="80" font-family="Arial, sans-serif" font-size="12" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">12.6V pack</text>

<rect x="240" y="40" width="150" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="315" y="62" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#04342C" text-anchor="middle" dominant-baseline="central">3S BMS</text>
<text x="315" y="80" font-family="Arial, sans-serif" font-size="12" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">Cell balancing</text>

<rect x="420" y="40" width="150" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="495" y="62" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#04342C" text-anchor="middle" dominant-baseline="central">Push switch</text>
<text x="495" y="80" font-family="Arial, sans-serif" font-size="12" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">Main switch</text>

<line x1="210" y1="68" x2="240" y2="68" stroke="#3d3d3a" stroke-width="1.5" marker-end="url(#arrow2)"/>
<line x1="390" y1="68" x2="420" y2="68" stroke="#3d3d3a" stroke-width="1.5" marker-end="url(#arrow2)"/>
<line x1="495" y1="96" x2="495" y2="130" stroke="#3d3d3a" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="60" y="130" width="510" height="30" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="315" y="145" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#2C2C2A" text-anchor="middle" dominant-baseline="central">12V rail</text>

<line x1="170" y1="160" x2="170" y2="190" stroke="#3d3d3a" stroke-width="1.5" marker-end="url(#arrow2)"/>
<line x1="450" y1="160" x2="450" y2="190" stroke="#3d3d3a" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="60" y="190" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="170" y="212" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#04342C" text-anchor="middle" dominant-baseline="central">Pump + solenoid</text>
<text x="170" y="230" font-family="Arial, sans-serif" font-size="12" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">MOSFET switched (Q1, Q2)</text>

<rect x="340" y="190" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="450" y="212" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#04342C" text-anchor="middle" dominant-baseline="central">LM2596 buck</text>
<text x="450" y="230" font-family="Arial, sans-serif" font-size="12" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">Steps 12V down to 5V</text>

<line x1="450" y1="246" x2="450" y2="280" stroke="#3d3d3a" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="340" y="280" width="220" height="30" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="450" y="295" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#2C2C2A" text-anchor="middle" dominant-baseline="central">5V rail</text>

<line x1="450" y1="310" x2="450" y2="340" stroke="#3d3d3a" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="340" y="340" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="450" y="362" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#04342C" text-anchor="middle" dominant-baseline="central">ESP32 + pressure sensor</text>
<text x="450" y="380" font-family="Arial, sans-serif" font-size="12" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">MCU and BP sensor supply</text>

<line x1="450" y1="396" x2="450" y2="430" stroke="#3d3d3a" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="340" y="430" width="220" height="30" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="450" y="445" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#2C2C2A" text-anchor="middle" dominant-baseline="central">3V3 rail</text>

<line x1="450" y1="460" x2="450" y2="490" stroke="#3d3d3a" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="340" y="490" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="450" y="512" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#04342C" text-anchor="middle" dominant-baseline="central">Sensors + OLED + buzzer</text>
<text x="450" y="530" font-family="Arial, sans-serif" font-size="12" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">AD8232, MAX30102, DS18B20</text>
</svg>
